# This file contains the commands to create a nats server cluster in docker containers on the linux server.

name: cssnats

services:
  nats-server-1:
    image: nats
    ports:
      - "8222:8222"
    command: "--cluster_name nats-cluster --cluster nats://0.0.0.0:6222 --http_port 8222 --routes=nats://nats-server-2:6222, nats://nats-server-3:6222"
    networks: ["cabin-network"]
  nats-server-2:
    image: nats
    command: "--cluster_name nats-cluster --cluster nats://0.0.0.0:6222 --routes=nats://nats-server-1:6222, nats://nats-server-3:6222"
    networks: ["cabin-network"]
    depends_on: ["nats-server-1"]
  nats-server-3:
    image: nats
    command: "--cluster_name nats-cluster --cluster nats://0.0.0.0:6222 --routes=nats://nats-server-1:6222, nats://nats-server-2:6222"
    networks: ["cabin-network"]
    depends_on: ["nats-server-1"]

networks:
  cabin-network:
    external: true
